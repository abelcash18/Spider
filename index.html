<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🕷️</text></svg>">
</head>
<body>
    <div class="holder">
        <!-- LOGIN FORM -->
        <div class="box" id="loginBox">
            <form id="loginForm">
                <h2>Sign In</h2>
                
                <div class="inputBox">
                    <input type="text" id="username" required>
                    <span>Username</span>
                </div>

                <div class="inputBox">
                    <input type="password" id="password" required>
                    <span>Password</span>
                    <span class="toggle-password">👁️</span>
                </div>

                <div class="links">
                    <a href="#" id="forgotBtn">Forgot Password?</a>
                    <a href="#" id="signupBtn">Sign Up</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>
        </div>

        <!-- USER PROFILE -->
        <div class="box profile-box" id="profileBox" style="display: none;">
            <div class="profile-header">
                <h2 id="welcomeMsg">Welcome!</h2>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
            
            <div class="profile-details">
                <div class="detail-item">
                    <label>Username</label>
                    <p id="profileUsername"></p>
                </div>
                <div class="detail-item">
                    <label>Email</label>
                    <p id="profileEmail"></p>
                </div>
                <div class="detail-item">
                    <label>Account Created</label>
                    <p id="profileCreated"></p>
                </div>
            </div>

            <button class="btn-delete" id="deleteAccountBtn">Delete Account</button>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="inputBox">
                    <input type="text" id="signupUsername" required>
                    <span>Username</span>
                </div>
                <div class="inputBox">
                    <input type="email" id="signupEmail" required>
                    <span>Email</span>
                </div>
                <div class="inputBox">
                    <input type="password" id="signupPassword" required>
                    <span>Password</span>
                </div>
                <div class="inputBox">
                    <input type="password" id="confirmPassword" required>
                    <span>Confirm Password</span>
                </div>
                <div class="password-strength" id="strengthMeter"></div>
                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Reset Password</h2>
            <form id="resetForm">
                <div class="inputBox">
                    <input type="email" id="resetEmail" required>
                    <span>Enter your email</span>
                </div>
                <p class="info-text">We'll send password reset instructions to your email</p>
                <button type="submit" class="btn-submit">Send Reset Link</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Spider Cursor -->
    <div class="spider-cursor" id="spider">🕷️</div>

    <script src="script.js"></script>
</body>
</html>
